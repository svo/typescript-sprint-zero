- name: Install Claude Code
  community.general.npm:
    name: '@anthropic-ai/claude-code'
    global: true
  become: true

- name: Add Context7 MCP Server to Claude Code
  ansible.builtin.shell: >
    claude mcp add --transport http --scope user context7 https://mcp.context7.com/mcp
  register: claude_mcp_add_context7
  changed_when: "'Added MCP server' in claude_mcp_add_context7.stdout or 'Successfully added' in claude_mcp_add_context7.stdout"
  failed_when: false

- name: Add Sequential Thinking MCP Server to Claude Code
  ansible.builtin.shell: >
    claude mcp add --scope user sequential-thinking npx -- -y @modelcontextprotocol/server-sequential-thinking
  register: claude_mcp_add_sequential
  changed_when: "'Added MCP server' in claude_mcp_add_sequential.stdout or 'Successfully added' in claude_mcp_add_sequential.stdout"
  failed_when: false

- name: Install CLI tools to assist Claude Code
  ansible.builtin.apt:
    name:
      - jq
      - ripgrep
      - fd-find
      - tree
    state: present
  become: true

- name: Ensure apt keyrings directory exists for GitHub CLI
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Add GitHub CLI apt keyring
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    mode: '0644'
  become: true

- name: Resolve Debian package architecture for GitHub CLI
  ansible.builtin.set_fact:
    claude_code_gh_deb_arch: "{{ ansible_facts['architecture'] | regex_replace('^x86_64$', 'amd64') | regex_replace('^aarch64$', 'arm64') }}"

- name: Add GitHub CLI apt repository
  ansible.builtin.apt_repository:
    repo: 'deb [arch={{ claude_code_gh_deb_arch }} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main'
    filename: github-cli
    state: present
    update_cache: true
  become: true

- name: Install GitHub CLI
  ansible.builtin.apt:
    name: gh
    state: present
  become: true
